# MedGrid Nginx Reverse Proxy Configuration
# Place this file in your Nginx configuration directory (e.g. /etc/nginx/sites-available/medgrid or /etc/nginx/nginx.conf)

server {
    listen 80;
    server_name localhost;

    # Root directory containing the built frontend static assets (pnpm --filter frontend build)
    root /var/www/medgrid/frontend/dist;
    index index.html;

    # Compression (Gzip) settings for premium performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # Serve built React static assets and handle client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the MedGrid Gateway Service
    location /api/v1 {
        proxy_pass http://127.0.0.1:4000/api/v1;
        proxy_http_version 1.1;
        
        # Forward headers for authentication & IP tracking
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support cookies and session credential passing across proxies
        proxy_set_header X-Forwarded-Host $host;
    }

    # Proxy Socket.IO WebSocket requests to the Gateway
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;

        # WebSocket connection upgrades
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep connection open for real-time events
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
